<script id="csinit" type="text/x-cindyscript">

<script id="cskeytyped" type="text/x-cindyscript">
//Script (CindyScript)
if(key()=="?" % keydownlist()==[32],
  if(!isreal(NumTyped),NumTyped=0);
  if(NumTyped==0,
    DispStr=
     "Figure(1) Parent(2) Parapara(3) Movie(4) Surf(5)";
  );
  if(NumTyped==1,
    DispStr=
     "Shift+ Title(T) Para(P) Slide(S) Digest(D)";
  );
  if(NumTyped==2,
    DispStr="Shift+ Meshlab(M)";
  );
  if(NumTyped==3,
    DispStr=
     "Ch : disp(0) chg(9) N(+,-) add(<) rmv(>)";
  );
  drawtext(mouse().xy,DispStr,size->24);
  NumTyped=mod(NumTyped+1,4);
,
  NumTyped=0;  
);
if(key()=="1",//Mkfigure
  Viewtex();
  kc();
);
if(key()=="2",//Mkparent
  Viewparent();
);
if(key()=="3",//Flipbook(Parapara)
  Flipbook();
);
if(key()=="4",//Texmovie
  Texmovie();
  kc();
);
if(key()=="5",//Surface
  Cheader();
  Cmain();
  kcC();
  if(ChNum>0,
    Ch=[ChNum];
  ,
    Ch=[1];
  );
  ChNum=0;
);
if(key()=="T",//Title
  Maketitle();
);
if(key()=="P",//ParaF
  Parafolder();
);
if(key()=="S",//Slide 
  Mkslides();
);
if(key()=="D",//Digest(Summary)
  Mkslidesummary();
);
if(key()=="M",//Meshlab
  Mkviewobj(OCNAME,OBJCMD,OCOPTION);
);

if(key()=="0",
  Dispchoice();
);
if(key()=="9",
  if(length(Ch)==0,
    Ch=[ChNum];
  ,
    if(!contains(Ch,ChNum),
      Ch=append(Ch,ChNum);
      ChNum=Ch_(length(Ch)-1);
      Ch=remove(Ch,[ChNum]);
      Ch=sort(Ch);
    );
  );
  Dispchoice();
);
if(key()=="+",
  ChNum=ChNum+1;
  Dispchoice();
);
if(key()=="-",
  ChNum=ChNum-1;
  Dispchoice();
);
if(key()=="<",
  if(length(select(Ch,#==ChNum))==0,
    Ch=append(Ch,ChNum);
    Ch=sort(Ch);
    ChNum=ChNum+1;
  );
  Dispchoice();
);
if(key()=="^",
  if(length(Ch)==0,
    Ch=[ChNum];
  ,
    if(!contains(Ch,ChNum),
      Ch=Ch_(1..(length(Ch)-1));
      Ch=append(Ch,ChNum);
      Ch=sort(Ch);
    );
  );
  ChNum=ChNum+1;
  Dispchoice();
);
if(key()=="~",
  if(length(Ch)==0,
    Ch=[ChNum];
  ,
    if(!contains(Ch,ChNum),
      Ch=Ch_(1..(length(Ch)-1));
      Ch=append(Ch,ChNum);
      Ch=sort(Ch);
    );
  );
  ChNum=max(ChNum-1,1);
  Dispchoice();
);
if(key()==">",
  if(length(Ch)>0,
    ChNum=Ch_(length(Ch));
    Ch=Remove(Ch,[ChNum]);
  );
  Dispchoice();
);

;

</script>
<script id="csdraw" type="text/x-cindyscript">
//figures
Ketinit();
Setketcindyjs(["Nolabel=all","Color=[0,0,0,0.1]"]);

Addax(1);
Setax(["a","x","e","y","n","O","se"]); 
Plotdata("1","2*x","x=[-5,5]",["Num=1","Color=blue"]);

Htickmark([1,"1",2,"2",3,"3",4,"4"]);
Htickmark([-1,"-1",-2,"-2"]);
Vtickmark([1,"1",2,"2",3,"3",4,"4"]);
Vtickmark([-1,"-1",-2,"-2"]);

Putpoint("P",[3,3],[P.x,P.y]);

FP=apply(P.xy,Op(1,Fracform(#,5)));//Pを5以下の数を分母とする分数により近似して
CP=apply(FP,Tocindyform(#));
PP=apply(CP,parse(#));//近似した分数を値として
PQ=[(-3*PP.x+4*PP.y)/5,(4*PP.x+3*PP.y)/5];
GP=apply(FP,Totexform(#));
tmp=pairs([1,2,3,4,5]);//計算する分数の分母の因数の候補
tmp=concat(tmp,apply(1..5,[#,#]));//1/1,2/2,...,5/5 を追加して
tmp=apply(tmp,#_1*#_2);//傾きmによらず可能性のある分母の候補
tmp=concat(tmp,apply(tmp,#*5));//分母に1+m^2=5を掛けることを想定した分母の候補
tmp=set(tmp);//重複を除く
GQ=apply(PQ,Totexform(Op(1,Fracform(#,tmp))));

Pointdata("P",PP,["Size=3","nodisp"]);
Pointdata("Q",PQ,["Size=3"]);
Listplot("1",[PP,PQ]);
PM=(PP+PQ)/2;
Pointdata("i",PM,["Size=3","Color=blue"]);
Segmark("1",[PP,PM],["Type=2"]); 
Segmark("2",[PQ,PM],["Type=2"]); 

TGP="\mathrm{P}\displaystyle("+GP.x+","+GP.y+")";
TGQ="\mathrm{Q}\displaystyle("+GQ.x+","+GQ.y+")";

if(PP_2<=PQ_2,
  dP="n2e2"; dQ="n2w2";
,
  dP="n2w"; dQ="s2e";
);
Expr([PP,dP,TGP,PQ,dQ,TGQ],["Size=1.6"]);
Expr([3,5],"e","y=2x",["Size=1.6"]);

Windispg();
;

</script>
