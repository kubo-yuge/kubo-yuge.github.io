<script id="csdraw" type="text/x-cindyscript">
//figures
Ketinit();
//Setparent("");
Setketcindyjs(["Nolabel=all","Color=[0,0,0,0.1]"]);

Addax(1);
Setax(["a","x","e","y","n","O","se"]); 
Plotdata("1","x","x=[-5,5]");
Setpt(3);
Putpoint("P",[3,3],[P.x,P.y]);
Pointdata("P",P.xy);
Putpoint("Q",[P.y,P.x]);
Pointdata("Q",Q);
Listplot([P,Q]);
Putintersect("M","gr1","sgPQ"); 
Segmark("1",[P,M],["Type=2"]); 
Segmark("2",[Q,M],["Type=2"]); 


Htickmark([1,"1",2,"2",3,"3",4,"4"]);
Htickmark([-1,"-1",-2,"-2"]);
Vtickmark([1,"1",2,"2",3,"3",4,"4"]);
Vtickmark([-1,"-1",-2,"-2"]);
Letter(P,"e2","P");
Letter(Q,"n2e","Q");

//Figpdf();
Windispg();
Help("Putinter");

;

</script>
