<script id="csinit" type="text/x-cindyscript">

<script id="csdraw" type="text/x-cindyscript">
//figures
Ketinit();
//Setfiles("Derva");

Setketcindyjs(["Sc=1.2","Nolabel=all","Color=lightgray","Figure=y"]);
Ketcindyjsbody(["<p,f5>微分係数の復習"],[]);
Addax(1);

F1="(x*(x^2-9))/9";
Plotdata("1",F1,"x",[]);
Putoncurve("A","gr1",["nodisp"]);
Putoncurve("B","gr1");

Lineplot("1",[A,B],["do"]);
Letter([A,"se","A",B,"se","B"]);

Plotdata("2","(((A.x)^2)/3-1)*(x-A.x)+A.y","x",["da"]);

Windispg();
//Help("Point");
;

</script>
